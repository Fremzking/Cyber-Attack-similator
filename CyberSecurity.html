<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber_board</title>
    <script>
        /* =========================
   💻 CLASSE ORDINATEUR
========================= */

class Computer {
    constructor(type, option) {
        this.type = type;
        this.option = option;
        this.state = "sain"; // état réel stocké
    }

    infect() {
        this.state = "infecté";
    }

    heal() {
        this.state = "sain";
    }
}

/* =========================
   🎲 PHÉNOMÈNES
========================= */

const phenomena = ["🦠 Virus", "👨‍💻 Hacker", "💥 Surcharge", "🌐 Coupure réseau", "✅ Rien"];

function generatePhenomenon() {
    let i = Math.floor(Math.random() * phenomena.length);
    return phenomena[i];
}

/* =========================
   🖥️ CRÉATION DES PC
========================= */

const PC1 = new Computer("Desktop", "Workspace");
const PC2 = new Computer("Desktop", "Workspace");
const PC3 = new Computer("Personal", "Workspace");

const computers = [PC1, PC2, PC3];

/* =========================
   🚨 GESTION DES ATTAQUES
========================= */

function simulateAttack() {
    return new Promise((resolve, reject) => {
        let hasard = Math.random();

        setTimeout(() => {
            if (hasard > 0.7) {
                resolve("attaque réussie");
            } else {
                reject("attaque échouée");
            }
        }, 1000);
    });
}

/* =========================
   🔁 SIMULATION PRINCIPALE
========================= */

async function simulation() {

    console.log("=================================");
    console.log("🖧 État du réseau :");

    /* 1. AFFICHAGE ÉTAT */
    computers.forEach((pc, index) => {
        console.log(`PC${index + 1} : ${pc.state}`);
    });

    /* 2. PHÉNOMÈNE */
    const pheno = generatePhenomenon();
    console.log("📡 Événement :", pheno);

    if (pheno === "✅ Rien") {
        console.log("✔ Aucun problème détecté");
        return;
    }

    /* 3. ATTAQUE */
    try {
        await simulateAttack();

        let index = Math.floor(Math.random() * computers.length);
        let target = computers[index];

        console.log(`🚨 ${pheno} sur PC${index + 1}`);

        target.infect();

    } catch {
        console.log("🛡️ Attaque bloquée par le système");
    }

    /* 4. PROPAGATION */
    computers.forEach((pc, index) => {
        if (pc.state === "infecté") {
            let hasard = Math.random();

            if (hasard > 0.6) {
                let cibleIndex = Math.floor(Math.random() * computers.length);
                let cible = computers[cibleIndex];

                if (cible.state === "sain") {
                    cible.infect();
                    console.log(`💥 Propagation : PC${index + 1} → PC${cibleIndex + 1}`);
                }
            }
        }
    });

    /* 5. DÉFENSE (NETTOYAGE) */
    computers.forEach((pc, index) => {
        let hasard = Math.random();

        if (pc.state === "infecté" && hasard > 0.7) {
            pc.heal();
            console.log(`🛠️ PC${index + 1} réparé`);
        }
    });
}

/* =========================
   ⏱️ LANCEMENT
========================= */

setInterval(simulation, 5000);

/* lancement immédiat */
simulation();
    </script>
</head>
<body>
    
</body>
</html>
